<!DOCTYPE html>
<html>
<head>
<title>You Said No?</title>

<style>

body{
font-family: Arial;
text-align: center;
background: linear-gradient(135deg,#ffe4ec,#ffc0cb);
padding-top: 100px;
color: #8b004f;
margin:0;
overflow:hidden;
}

.card{
background:white;
padding:30px;
margin:auto;
width:75%;
max-width:450px;
border-radius:18px;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

button{
padding:12px 24px;
font-size:16px;
border:none;
border-radius:25px;
background:#ff1493;
color:white;
cursor:pointer;
margin-top:20px;
}

button:hover{
transform:scale(1.08);
}

.emoji{
position:fixed;
top:-40px;
font-size:30px;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh);
opacity:0;
}
}

</style>

<script>

function cryRain(){

setInterval(()=>{

const emoji=document.createElement("div")

emoji.className="emoji"

emoji.innerHTML="😭"

emoji.style.left=Math.random()*100+"vw"

document.body.appendChild(emoji)

setTimeout(()=>{
emoji.remove()
},3000)

},200)

}

</script>

</head>

<body onload="cryRain()">

<div class="card">

<h2>😭 You said NO?</h2>

<p>
That wasn't supposed to be the correct answer...  
You don't like meeee!? 😭  
Please think again....
</p>

<a href="index.html">
<button>Try Again</button>
</a>

</div>

</body>
</html>

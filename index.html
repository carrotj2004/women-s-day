<!DOCTYPE html>
<html>
<head>
<title>Happy Women's Day</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#ffb6c1,#ffc0cb,#ffd6e7);
padding-top:100px;
color:#8b004f;
overflow:hidden;
}

h1{
font-size:42px;
}

button{
padding:14px 28px;
margin:15px;
font-size:18px;
border:none;
border-radius:25px;
cursor:pointer;
transition:0.3s;
}

.yes{
background:#ff1493;
color:white;
}

.no{
background:#ff69b4;
color:white;
}

button:hover{
transform:scale(1.1);
}

</style>

</head>

<body>

<h1>🌸 Happy Women's Day 🌸</h1>

<h2>Do you want to see something? 👀</h2>

<a href="yes.html">
<button class="yes">Yes</button>
</a>

<a href="no.html">
<button class="no">No</button>
</a>

<script>

setInterval(()=>{
const heart=document.createElement("div")

heart.innerHTML="💖"

heart.style.position="fixed"
heart.style.left=Math.random()*100+"vw"
heart.style.top="100vh"
heart.style.fontSize="24px"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),3000)

},500)

</script>

</body>
</html>
